<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cancionero · Nueva Alianza · San Roberto</title>
<meta name="description" content="Cancionero del Ministerio de Música Nueva Alianza, Sector San Roberto. Funciona sin internet.">
<style>
:root{
  /* marca (hex fijos del cancionero impreso) */
  --tinta:#0F4761;        /* teal de títulos */
  --acorde:#215E99;       /* azul de acordes */
  --dorado:#C8A24B;
  --sobre-tinta:#fff;     /* texto sobre superficies de marca rellenas */
  /* superficies y texto (papel cálido) */
  --papel:#FBF8F2;
  --papel2:#F2ECDF;
  --tarjeta:#FFFFFF;
  --texto:#22282B;
  --suave:#6A7280;
  --linea:#E6DFCD;
  /* realces de marca translúcidos */
  --tinta-soft:rgba(15,71,97,.08);
  --acorde-soft:rgba(33,94,153,.10);
  /* escala de espaciado */
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:24px; --s6:32px;
  /* radios */
  --r1:8px; --r2:12px; --r3:16px; --rpill:999px;
  /* sombras suaves */
  --sombra:0 1px 2px rgba(20,30,40,.04), 0 2px 8px rgba(20,30,40,.05);
  --sombra-alta:0 6px 24px rgba(20,30,40,.10);
  /* tipografía (solo fuentes del sistema) */
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
  --fs:13px;              /* tamaño de la hoja de acordes */
}
html[data-theme="oscuro"]{
  --tinta:#9CCBE0;
  --acorde:#7FB3E8;
  --sobre-tinta:#08222E;
  --papel:#0B181F;
  --papel2:#10242E;
  --tarjeta:#13272F;
  --texto:#E7E3D7;
  --suave:#8F9DA4;
  --linea:#213642;
  --tinta-soft:rgba(156,203,224,.10);
  --acorde-soft:rgba(127,179,232,.14);
  --sombra:0 1px 2px rgba(0,0,0,.30), 0 2px 10px rgba(0,0,0,.30);
  --sombra-alta:0 8px 28px rgba(0,0,0,.45);
}
*{box-sizing:border-box;margin:0;padding:0}
.fila,.chip,.btn-desc,.grupo button,#btnAcordes,#btnTema,.buscar input{transition:background .15s ease,border-color .15s ease,color .15s ease,box-shadow .15s ease,transform .08s ease}
html,body{height:100%}
body{
  background:var(--papel);color:var(--texto);
  font-family:var(--sans);
  -webkit-text-size-adjust:100%;
}
.mono{font-family:var(--mono)}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
button:focus-visible,input:focus-visible,a:focus-visible{outline:2px solid var(--acorde);outline-offset:2px;border-radius:4px}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

/* ====== encabezado ====== */
header{
  position:sticky;top:0;z-index:10;
  background:color-mix(in srgb,var(--papel) 88%,transparent);
  backdrop-filter:saturate(1.2) blur(8px);
  -webkit-backdrop-filter:saturate(1.2) blur(8px);
  border-bottom:1px solid var(--linea);
  padding:env(safe-area-inset-top) 0 0;
}
.brand{display:flex;align-items:center;gap:var(--s3);padding:var(--s3) var(--s4) var(--s2)}
.cruz{
  width:38px;height:38px;flex:none;border-radius:10px;
  background:linear-gradient(145deg,var(--tinta),color-mix(in srgb,var(--tinta) 70%,#000));
  display:grid;place-items:center;color:var(--sobre-tinta);font-weight:700;
  font-family:var(--mono);font-size:20px;box-shadow:var(--sombra);
}
.brand h1{font-family:var(--mono);font-size:18px;letter-spacing:.01em;color:var(--tinta);line-height:1.05}
.brand small{display:block;font-family:var(--sans);font-weight:500;font-size:10.5px;color:var(--suave);letter-spacing:.10em;text-transform:uppercase;margin-top:3px}
#btnTema{margin-left:auto;font-size:20px;padding:8px 10px;border-radius:var(--r1);color:var(--suave)}
#btnTema:hover{background:var(--papel2);color:var(--tinta)}
.buscar{padding:0 var(--s4) var(--s3)}
.buscar input{
  width:100%;padding:11px 15px;font-size:16px;border-radius:var(--r2);
  border:1px solid var(--linea);background:var(--tarjeta);color:var(--texto);
  box-shadow:var(--sombra);
}
.buscar input:focus{border-color:var(--acorde)}
.buscar input::placeholder{color:var(--suave)}
.chips{display:flex;gap:var(--s2);overflow-x:auto;padding:0 var(--s4) var(--s3);scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex:none;padding:7px 14px;border-radius:var(--rpill);font-size:13px;font-weight:500;
  border:1px solid var(--linea);background:var(--tarjeta);color:var(--texto);white-space:nowrap;
}
.chip:hover{border-color:var(--tinta)}
.chip[aria-pressed="true"]{background:var(--tinta);border-color:var(--tinta);color:var(--sobre-tinta);font-weight:600}
.chip .dot{display:inline-block;width:8px;height:8px;border-radius:99px;margin-right:6px;vertical-align:1px}
.chip[aria-pressed="true"] .dot{box-shadow:0 0 0 2px rgba(255,255,255,.5)}

/* ====== índice ====== */
main{max-width:680px;margin:0 auto;padding:var(--s3) var(--s3) 64px}
.sec-h{
  display:flex;align-items:center;gap:var(--s3);
  margin:var(--s6) var(--s1) var(--s3);
  position:sticky;top:0;z-index:1;
}
.sec-h .cinta{width:28px;height:14px;border-radius:0 0 6px 6px;flex:none}
.sec-h h2{font-family:var(--mono);font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:var(--tinta);flex:1}
.sec-h span{
  font-size:11px;color:var(--suave);font-family:var(--mono);
  background:var(--papel2);padding:2px 9px;border-radius:var(--rpill);
}
.fila{
  display:flex;align-items:center;gap:var(--s3);width:100%;text-align:left;
  background:var(--tarjeta);border:1px solid var(--linea);border-radius:var(--r2);
  padding:12px 14px;margin-bottom:var(--s2);box-shadow:var(--sombra);
}
.fila:hover{border-color:var(--tinta);transform:translateY(-1px);box-shadow:var(--sombra-alta)}
.fila:active{transform:translateY(0)}
.fila .cinta{width:4px;align-self:stretch;border-radius:var(--rpill);flex:none}
.fila .t{flex:1;min-width:0}
.fila .t b{font-weight:600;font-size:15px;display:block;line-height:1.3;color:var(--texto)}
.fila .t i{font-style:normal;font-size:12px;color:var(--suave)}
.fila .pg{font-family:var(--mono);font-size:11px;color:var(--suave);flex:none}
.fila .chevron{color:var(--suave);flex:none;font-size:17px;opacity:.5}
.vacio{text-align:center;color:var(--suave);padding:56px 16px;font-size:14px;line-height:1.7}

/* ====== vista de canción ====== */
#cancion{position:fixed;inset:0;z-index:20;background:var(--papel);display:none;flex-direction:column}
#cancion.abierta{display:flex}
.c-top{
  display:flex;align-items:center;gap:var(--s2);padding:10px var(--s3) 9px;
  padding-top:calc(10px + env(safe-area-inset-top));
  border-bottom:1px solid var(--linea);
  background:color-mix(in srgb,var(--papel) 90%,transparent);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.c-top button{padding:8px 11px;border-radius:var(--r1);font-size:14px}
#btnVolver{font-weight:600;color:var(--tinta)}
#btnVolver:hover{background:var(--tinta-soft)}
.c-scroll{flex:1;overflow:auto;-webkit-overflow-scrolling:touch}
.c-cab{padding:var(--s5) var(--s5) var(--s1);max-width:760px;margin:0 auto;width:100%}
.c-cab .eyebrow{display:flex;align-items:center;gap:var(--s2);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--suave);margin-bottom:var(--s2)}
.c-cab .eyebrow .cinta{width:24px;height:11px;border-radius:0 0 5px 5px}
.c-cab h2{font-family:var(--mono);color:var(--tinta);font-size:25px;line-height:1.18;font-weight:700;letter-spacing:-.01em}
.c-cab .autor{font-size:13px;color:var(--suave);font-style:italic;margin-top:6px}
.c-herr{
  display:flex;flex-wrap:wrap;gap:var(--s2);align-items:center;
  padding:var(--s4) var(--s5);max-width:760px;margin:0 auto;width:100%;
}
.grupo{display:flex;align-items:center;border:1px solid var(--linea);border-radius:var(--r1);background:var(--tarjeta);overflow:hidden;box-shadow:var(--sombra)}
.grupo button{padding:8px 13px;font-size:15px;line-height:1}
.grupo button:hover{background:var(--papel2)}
.grupo .val{font-family:var(--mono);font-size:12px;min-width:48px;text-align:center;color:var(--texto)}
.grupo .lbl{font-size:10.5px;color:var(--suave);padding-left:12px;letter-spacing:.06em;text-transform:uppercase}
#btnAcordes{border:1px solid var(--linea);border-radius:var(--r1);background:var(--tarjeta);padding:8px 13px;font-size:12px;color:var(--texto);box-shadow:var(--sombra);font-weight:600}
#btnAcordes:hover{background:var(--papel2)}
#btnAcordes[aria-pressed="false"]{color:var(--suave);text-decoration:line-through;font-weight:400}
.hoja-wrap{padding:var(--s1) var(--s5) 96px;max-width:760px;margin:0 auto;width:100%}
.hoja{
  font-family:var(--mono);
  font-size:var(--fs);line-height:1.5;white-space:pre;overflow-x:auto;
  background:var(--tarjeta);border:1px solid var(--linea);border-radius:var(--r3);
  padding:var(--s5) var(--s4);box-shadow:var(--sombra);
}
.hoja .c{color:var(--acorde);font-weight:700}
.hoja.sin-acordes .c{display:none}
.hoja .b{display:block;height:1em}
.hoja.sin-acordes .c + .b{display:none}
footer{
  text-align:center;color:var(--suave);font-size:12px;line-height:1.8;
  padding:var(--s6) var(--s5) calc(var(--s6) + env(safe-area-inset-bottom));
  border-top:1px solid var(--linea);margin-top:var(--s6);
}
footer b{color:var(--tinta);font-family:var(--mono);font-weight:700}
.btn-desc{
  margin-top:var(--s4);padding:11px 18px;border-radius:var(--r2);
  border:1px solid var(--tinta);color:var(--sobre-tinta);
  background:linear-gradient(145deg,var(--tinta),color-mix(in srgb,var(--tinta) 78%,#000));
  font-size:13px;font-weight:600;box-shadow:var(--sombra);
}
.btn-desc:hover{box-shadow:var(--sombra-alta);transform:translateY(-1px)}
.btn-desc:active{transform:translateY(0)}
.btn-desc[disabled]{opacity:.6;cursor:progress;transform:none;box-shadow:var(--sombra)}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="cruz" aria-hidden="true">✠</div>
    <h1>Cancionero<small>Nueva Alianza · San Roberto · 2026</small></h1>
    <button id="btnTema" title="Cambiar modo claro / oscuro" aria-label="Cambiar modo claro u oscuro">◐</button>
  </div>
  <div class="buscar">
    <input id="q" type="search" placeholder="Buscar por título, letra o autor…" autocomplete="off" aria-label="Buscar canción">
  </div>
  <nav class="chips" id="chips" aria-label="Secciones"></nav>
</header>

<main>
  <div id="lista"></div>
  <footer>
    Ministerio de Música <b>Nueva Alianza</b> · Sector San Roberto Abad<br>
    Funciona sin internet una vez descargado.<br>
    <button id="btnDescargar" class="btn-desc">⬇ Descargar para usar sin internet</button>
  </footer>
</main>

<section id="cancion" role="dialog" aria-modal="true" aria-labelledby="cTitulo">
  <div class="c-top">
    <button id="btnVolver">← Índice</button>
  </div>
  <div class="c-scroll" id="cScroll">
    <div class="c-cab">
      <div class="eyebrow"><span class="cinta" id="cCinta"></span><span id="cSeccion"></span><span id="cPag"></span></div>
      <h2 id="cTitulo"></h2>
      <div class="autor" id="cAutor"></div>
    </div>
    <div class="c-herr">
      <div class="grupo" role="group" aria-label="Transponer tono">
        <span class="lbl">Tono</span>
        <button id="tMenos" aria-label="Bajar medio tono">−</button>
        <span class="val" id="tVal">original</span>
        <button id="tMas" aria-label="Subir medio tono">＋</button>
      </div>
      <div class="grupo" role="group" aria-label="Tamaño de letra">
        <button id="fMenos" aria-label="Reducir letra" style="font-size:12px">A−</button>
        <button id="fMas" aria-label="Agrandar letra" style="font-size:17px">A＋</button>
      </div>
      <button id="btnAcordes" aria-pressed="true">Acordes</button>
    </div>
    <div class="hoja-wrap"><pre class="hoja" id="hoja"></pre></div>
  </div>
</section>

<script>
const EMBEDDED = null; /* ==EMBED-SLOT== */
let SONGS = [];
const SECCIONES = ["Alabanza","Adoración","Exaltación","Espíritu Santo","María","Desagravio","Perdón"];
const COLOR = {
  "Alabanza":"#D9912F","Adoración":"#7E5BA6","Exaltación":"#C84B31",
  "Espíritu Santo":"#D1495B","María":"#4D7FBF","Desagravio":"#5E6B72","Perdón":"#5F8E6E"
};

/* ---------- almacenamiento seguro ---------- */
const store = {
  get(k,d){ try{ const v = localStorage.getItem(k); return v===null?d:JSON.parse(v); }catch(e){ return d; } },
  set(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
};
let fs = store.get('fs', 13);
document.documentElement.style.setProperty('--fs', fs+'px');
if (store.get('tema','claro')==='oscuro') document.documentElement.dataset.theme='oscuro';

/* ---------- utilidades ---------- */
const norm = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();

/* ---------- transposición ---------- */
/* ==PURE-START== */
const SHARP=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const BASE={C:0,D:2,E:4,F:5,G:7,A:9,B:11};
const LAT={Do:'C',Re:'D',Mi:'E',Fa:'F',Sol:'G',La:'A',Si:'B'};
const LAT_INV={C:'Do','C#':'Do#',D:'Re','D#':'Re#',E:'Mi',F:'Fa','F#':'Fa#',G:'Sol','G#':'Sol#',A:'La','A#':'La#',B:'Si'};
const ROOT='(?:[A-G](?:##?|bb?)?|(?:Do|Re|Mi|Fa|Sol|La|Si)[#b]?)';
const QUAL='(?:maj|min|sus|dim|aug|add|m|M|°)?\\d{0,2}(?:sus\\d?|add\\d{0,2}|maj\\d{0,2})?';
const RE_CHORD=new RegExp('^\\(?\\/{0,4}'+ROOT+QUAL+'(?:\\((?:[b#]?\\d+|'+ROOT+QUAL+')\\))?(?:/'+ROOT+')?\\)?[\\/\\-–]{0,4}[\\*\']?$');
const RE_SEQ=/^[A-G][#b]?(?:m|M)?\d{0,2}(?:[-–][A-G][#b]?(?:m|M)?\d{0,2})+$/;
const RE_ROOT=/(Do|Re|Mi|Fa|Sol|La|Si|[A-G])(##?|bb?)?/g;

function shift(root, acc, n){
  const latin = root.length > 1;
  const letra = LAT[root] || root;
  let semi = BASE[letra];
  if (acc) semi += (acc[0]==='#' ? acc.length : -acc.length);
  semi = ((semi + n) % 12 + 12) % 12;
  const nuevo = SHARP[semi];
  return latin ? LAT_INV[nuevo] : nuevo;
}
function transponerLinea(linea, n){
  if (!n) return linea;
  return linea.split(/(\s+)/).map(tok=>{
    if (!tok.trim()) return tok;
    if (RE_CHORD.test(tok) || RE_SEQ.test(tok))
      return tok.replace(RE_ROOT, (m, r, a) => shift(r, a||'', n));
    return tok;
  }).join('');
}
/* Devuelve el src de index.html con las canciones incrustadas en el slot EMBEDDED. */
function inyectarDatos(src, songs){
  const slot = 'const EMBEDDED = null; /* ==EMBED-SLOT== */';
  const relleno = 'const EMBEDDED = ' + JSON.stringify(songs) + '; /* ==EMBED-SLOT== */';
  if (!src.includes(slot)) throw new Error('No se encontró el slot EMBEDDED');
  return src.replace(slot, relleno);
}
/* ==PURE-END== */

/* ---------- índice ---------- */
const $lista=document.getElementById('lista'), $q=document.getElementById('q'), $chips=document.getElementById('chips');
let filtroSec='Todas';
const chipDefs=['Todas',...SECCIONES];
chipDefs.forEach(c=>{
  const b=document.createElement('button');
  b.className='chip'; b.setAttribute('aria-pressed', c===filtroSec);
  b.innerHTML = COLOR[c] ? `<span class="dot" style="background:${COLOR[c]}"></span>${c}` : c;
  b.onclick=()=>{ filtroSec=c; [...$chips.children].forEach(x=>x.setAttribute('aria-pressed', x===b)); render(); };
  $chips.appendChild(b);
});

function fila(s){
  const b=document.createElement('button');
  b.className='fila';
  b.innerHTML=`<span class="cinta" style="background:${COLOR[s.section]}"></span>
    <span class="t"><b>${s.title}</b>${s.author?`<i>${s.author}</i>`:''}</span>
    <span class="pg">p.${s.page}</span>
    <span class="chevron" aria-hidden="true">›</span>`;
  b.onclick=()=>abrir(s.id);
  return b;
}
function render(){
  const q=norm($q.value.trim());
  const palabras=q.split(/\s+/).filter(Boolean);
  let canciones=SONGS.filter(s=>{
    if (SECCIONES.includes(filtroSec) && s.section!==filtroSec) return false;
    if (palabras.length && !palabras.every(p=>s._busq.includes(p))) return false;
    return true;
  });
  $lista.innerHTML='';
  if (!canciones.length){
    $lista.innerHTML='<div class="vacio">No se encontró ninguna canción.<br>Prueba con otra palabra o revisa la sección elegida.</div>';
    return;
  }
  SECCIONES.forEach(sec=>{
    const del=canciones.filter(s=>s.section===sec);
    if (!del.length) return;
    const h=document.createElement('div'); h.className='sec-h';
    h.innerHTML=`<span class="cinta" style="background:${COLOR[sec]}"></span><h2>${sec}</h2><span>${del.length}</span>`;
    $lista.appendChild(h);
    del.forEach(s=>$lista.appendChild(fila(s)));
  });
}
$q.addEventListener('input', render);

/* ---------- vista de canción ---------- */
const $vista=document.getElementById('cancion'), $hoja=document.getElementById('hoja');
let actual=null, trans=0, conAcordes=true;

function pintarHoja(){
  const s=SONGS[actual];
  $hoja.innerHTML = s.lines.map(l=>{
    if (l.k==='b') return '<span class="b"></span>';
    const t = l.k==='c' ? transponerLinea(l.t, trans) : l.t;
    const esc = t.replace(/&/g,'&amp;').replace(/</g,'&lt;');
    return `<span class="${l.k==='c'?'c':'l'}">${esc}</span>\n`;
  }).join('');
  document.getElementById('tVal').textContent = trans===0 ? 'original' : (trans>0?'+':'')+trans;
}
function abrir(id){
  actual=id; trans=0;
  const s=SONGS[id];
  document.getElementById('cTitulo').textContent=s.title;
  document.getElementById('cAutor').textContent=s.author||'';
  document.getElementById('cAutor').style.display=s.author?'':'none';
  document.getElementById('cSeccion').textContent=s.section;
  document.getElementById('cPag').textContent='· pág. '+s.page;
  document.getElementById('cCinta').style.background=COLOR[s.section];
  pintarHoja();
  $vista.classList.add('abierta');
  document.getElementById('cScroll').scrollTop=0;
  if (location.hash!=='#c'+id) history.pushState(null,'','#c'+id);
}
function cerrar(){
  $vista.classList.remove('abierta');
  if (location.hash) history.pushState(null,'','#');
}
document.getElementById('btnVolver').onclick=cerrar;
window.addEventListener('popstate', ()=>{
  const m=location.hash.match(/^#c(\d+)$/);
  if (m && SONGS[+m[1]]) abrir(+m[1]); else $vista.classList.remove('abierta');
});

document.getElementById('tMas').onclick=()=>{ trans=Math.min(trans+1,11); pintarHoja(); };
document.getElementById('tMenos').onclick=()=>{ trans=Math.max(trans-1,-11); pintarHoja(); };
document.getElementById('fMas').onclick=()=>{ fs=Math.min(fs+1,22); document.documentElement.style.setProperty('--fs',fs+'px'); store.set('fs',fs); };
document.getElementById('fMenos').onclick=()=>{ fs=Math.max(fs-1,9); document.documentElement.style.setProperty('--fs',fs+'px'); store.set('fs',fs); };
document.getElementById('btnAcordes').onclick=e=>{
  conAcordes=!conAcordes;
  e.currentTarget.setAttribute('aria-pressed', conAcordes);
  $hoja.classList.toggle('sin-acordes', !conAcordes);
};
document.getElementById('btnTema').onclick=()=>{
  const osc=document.documentElement.dataset.theme==='oscuro';
  if (osc) delete document.documentElement.dataset.theme;
  else document.documentElement.dataset.theme='oscuro';
  store.set('tema', osc?'claro':'oscuro');
};

async function cargarSongs(){
  if (Array.isArray(EMBEDDED)) return EMBEDDED;
  try{
    const r = await fetch('datos/songs.json', {cache:'no-store'});
    if (!r.ok) throw new Error('HTTP '+r.status);
    return await r.json();
  }catch(e){
    return null;
  }
}
async function iniciar(){
  const data = await cargarSongs();
  if (!data){
    document.getElementById('lista').innerHTML =
      '<div class="vacio">No se pudieron cargar las canciones.<br>' +
      'Si abriste este archivo desde tu computadora, descárgalo de nuevo desde el sitio web ' +
      'usando el botón <b>Descargar</b>.</div>';
    return;
  }
  SONGS = data;
  SONGS.forEach((s, i) => { s.id = i; });
  SONGS.forEach(s => { s._busq = norm(s.title+' '+(s.author||'')+' '+s.lines.map(l=>l.t).join(' ')); });
  render();
  const m = location.hash.match(/^#c(\d+)$/);
  if (m && SONGS[+m[1]]) abrir(+m[1]);
}
async function descargar(){
  const btn = document.getElementById('btnDescargar');
  btn.disabled = true; const txt = btn.textContent;
  btn.textContent = 'Preparando…';
  try{
    const resp = await fetch('index.html', {cache:'no-store'});
    if (!resp.ok) throw new Error('HTTP '+resp.status);
    const src = await resp.text();
    const out = '<!DOCTYPE html>\n' + inyectarDatos(src, SONGS).replace(/^<!DOCTYPE html>\s*/i,'');
    const blob = new Blob([out], {type:'text/html;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'Cancionero_Nueva_Alianza_San_Roberto.html';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    btn.textContent = '✓ Descargado';
    setTimeout(()=>{ btn.textContent = txt; btn.disabled = false; }, 2500);
  }catch(e){
    btn.textContent = 'No se pudo descargar';
    setTimeout(()=>{ btn.textContent = txt; btn.disabled = false; }, 2500);
  }
}
document.getElementById('btnDescargar').addEventListener('click', descargar);
iniciar();
</script>
